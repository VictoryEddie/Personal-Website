    <!-- ========== MAIN ========== -->
    <main>
        <div class="container page-wrapper">

            <header class="page-header">
                <div class="profile-card fade-up">
                    <svg class="profile-deco-svg" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 70C20 42.3858 42.3858 20 70 20C97.6142 20 120 42.3858 120 70" stroke="#FF6C38"
                            stroke-width="2" stroke-dasharray="6 6" />
                    </svg>
                    <div class="profile-img-wrapper">
                        <img src="./images/EdwinImage.png" alt="Ejike Victory" class="profile-img">
                    </div>
                    <p class="profile-name">Ejike Victory</p>
                    <p class="profile-bio">A Software Engineer who has developed countless innovative solutions.</p>
                </div>
                <div class="page-title-block fade-up" style="animation-delay: 0.1s">
                    <h1 class="page-title-large">
                        PREMIUM
                        <span class="dim">TOOLS</span>
                    </h1>
                </div>
            </header>

            <section class="section" style="padding-top: 0;">
                <div class="tools-grid">
                    <div class="tool-card fade-up">
                        <div class="tool-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M5 5.5A3.5 3.5 0 0 1 8.5 2H12v7H8.5A3.5 3.5 0 0 1 5 5.5z" />
                                <path d="M12 2h3.5a3.5 3.5 0 1 1 0 7H12V2z" />
                                <path d="M5 15.5A3.5 3.5 0 0 1 8.5 12H12v7H8.5a3.5 3.5 0 0 1-3.5-3.5z" />
                                <path d="M12 12h3.5a3.5 3.5 0 1 1 0 7H12v-7z" />
                            </svg>
                        </div>
                        <p class="tool-name">Figma</p>
                    </div>
                    <div class="tool-card fade-up">
                        <div class="tool-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                            </svg>
                        </div>
                        <p class="tool-name">ChatGPT</p>
                    </div>
                    <div class="tool-card fade-up">
                        <div class="tool-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                            </svg>
                        </div>
                        <p class="tool-name">Next.js</p>
                    </div>
                    <div class="tool-card fade-up">
                        <div class="tool-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                <path d="M9 3v18M15 3v18M3 9h18M3 15h18" />
                            </svg>
                        </div>
                        <p class="tool-name">Notion</p>
                    </div>
                    <div class="tool-card fade-up">
                        <div class="tool-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                            </svg>
                        </div>
                        <p class="tool-name">HTML</p>
                    </div>
                    <div class="tool-card fade-up">
                        <div class="tool-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                            </svg>
                        </div>
                        <p class="tool-name">TailwindCSS</p>
                    </div>
                </div>
            </section>

            <!-- CTA SECTION -->
            <section class="contact-section fade-up" style="margin-top: 40px;">
                <h2 class="contact-heading">
                    LET'S WORK
                    <span class="dim">TOGETHER</span>
                </h2>
                <div style="margin-top: 32px;">
                    <button class="btn-submit js-open-contact">Contact Me</button>
                </div>
            </section>

        </div>
    </main>

    <!-- ========== CONTACT MODAL ========== -->
    <div class="modal-overlay" id="contactModal">
        <div class="modal-container">
            <button class="modal-close" id="closeModal" aria-label="Close modal">&times;</button>
            <h2 class="contact-heading" style="font-size: 48px; margin-bottom: 32px;">CONTACT <span
                    class="dim">ME</span></h2>
            <form class="contact-form" id="modalContactForm" autocomplete="off">
                <div class="form-row">
                    <div class="form-group">
                        <label for="modal-name">Name</label>
                        <input type="text" id="modal-name" name="name" placeholder="Your Name" required />
                    </div>
                    <div class="form-group">
                        <label for="modal-email">Email</label>
                        <input type="email" id="modal-email" name="email" placeholder="Your@email.com" required />
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:24px;">
                    <label for="modal-budget">Budget</label>
                    <select id="modal-budget" name="budget" required>
                        <option value="" disabled selected>Select...</option>
                        <option value="under-1k">Under $1,000</option>
                        <option value="1k-5k">$1,000 – $5,000</option>
                        <option value="10k-plus">$10,000+</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:24px;">
                    <label for="modal-message">Message</label>
                    <textarea id="modal-message" name="message" placeholder="Describe your project" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>Made by Victory</p>
    </footer>

    <script src="main.js"></script>
</body>

</html>
