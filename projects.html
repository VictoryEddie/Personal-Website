    <!-- ========== MAIN ========== -->
    <main>
        <div class="container page-wrapper">

            <header class="page-header">
                <div class="profile-card fade-up">
                    <svg class="profile-deco-svg" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 70C20 42.3858 42.3858 20 70 20C97.6142 20 120 42.3858 120 70" stroke="#FF6C38"
                            stroke-width="2" stroke-dasharray="6 6" />
                    </svg>
                    <div class="profile-img-wrapper">
                        <img src="./images/EdwinImage.png" alt="Ejike Victory" class="profile-img">
                    </div>
                    <p class="profile-name">Victory Edwin</p>
                    <p class="profile-bio">A Web Engineer who is in the process of developing innovative solutions for
                        small scale and large scale systems.</p>
                </div>
                <div class="page-title-block fade-up" style="animation-delay: 0.1s">
                    <h1 class="page-title-large">
                        SELECTED
                        <span class="dim">PROJECTS</span>
                    </h1>
                </div>
            </header>

            <section class="section" style="padding-top: 0;">
                <div class="projects-list">
                    <a href="https://mood-cafe-eight.vercel.app/" class="project-item fade-up">
                        <div class="project-thumb">
                            <img src="./images/MoodScreenGrab.png" alt="Mood. Cafe" class="project-img">
                        </div>
                        <div class="project-info">
                            <h3 class="project-name">Mood. Cafe</h3>
                            <p class="project-tag">Web Design</p>
                        </div>
                        <div class="project-arrow">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" width="24" height="24">
                                <line x1="7" y1="17" x2="17" y2="7" />
                                <polyline points="7 7 17 7 17 17" />
                            </svg>
                        </div>
                    </a>
                    <a href="https://cafe-noir-sigma.vercel.app/" class="project-item fade-up">
                        <div class="project-thumb">
                            <img src="./images/NoirScreenGrab.png" alt="Cafe Noir." class="project-img">
                        </div>
                        <div class="project-info">
                            <h3 class="project-name">Cafe Noir.</h3>
                            <p class="project-tag">Web Design</p>
                        </div>
                        <div class="project-arrow">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" width="24" height="24">
                                <line x1="7" y1="17" x2="17" y2="7" />
                                <polyline points="7 7 17 7 17 17" />
                            </svg>
                        </div>
                    </a>
                    <a href="https://portfolio-website-eta-lake-89.vercel.app/" class="project-item fade-up">
                        <div class="project-thumb">
                            <img src="./images/portfolio-Template.png" alt="Portfolio Template" class="project-img">
                        </div>
                        <div class="project-info">
                            <h3 class="project-name">Portfolio Template</h3>
                            <p class="project-tag">Web Design</p>
                        </div>
                        <div class="project-arrow">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" width="24" height="24">
                                <line x1="7" y1="17" x2="17" y2="7" />
                                <polyline points="7 7 17 7 17 17" />
                            </svg>
                        </div>
                    </a>
                </div>
            </section>

            <!-- CTA SECTION -->
            <section class="contact-section fade-up" style="margin-top: 40px;">
                <h2 class="contact-heading">
                    LET'S WORK
                    <span class="dim">TOGETHER</span>
                </h2>
                <div style="margin-top: 32px;">
                    <button class="btn-submit js-open-contact">Contact Me</button>
                </div>
            </section>

        </div>
    </main>

    <!-- ========== CONTACT MODAL ========== -->
    <div class="modal-overlay" id="contactModal">
        <div class="modal-container">
            <button class="modal-close" id="closeModal" aria-label="Close modal">&times;</button>
            <h2 class="contact-heading" style="font-size: 48px; margin-bottom: 32px;">CONTACT <span
                    class="dim">ME</span></h2>
            <form class="contact-form" id="modalContactForm" autocomplete="off">
                <div class="form-row">
                    <div class="form-group">
                        <label for="modal-name">Name</label>
                        <input type="text" id="modal-name" name="name" placeholder="Your Name" required />
                    </div>
                    <div class="form-group">
                        <label for="modal-email">Email</label>
                        <input type="email" id="modal-email" name="email" placeholder="Your@email.com" required />
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:24px;">
                    <label for="modal-budget">Budget</label>
                    <select id="modal-budget" name="budget" required>
                        <option value="" disabled selected>Select...</option>
                        <option value="under-500">Under $500</option>
                        <option value="under-1k">$500 - $1,000</option>
                        <option value="1k-5k">$1,000 - $5,000</option>
                        <option value="10k-plus">$5,000+</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:24px;">
                    <label for="modal-message">Message</label>
                    <textarea id="modal-message" name="message" placeholder="Describe your project" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Submit</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>Made by Victory</p>
    </footer>
